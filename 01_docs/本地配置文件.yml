############## server配置
server:
  port: 8091
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml
######## Sa-Token (文档地址: https://sa-token.cc)
sa-token:
  # token名称
  token-name: Authorization
  # token过期时间
  timeout: 640800
  # token临时有效期 (指定时间内无操作就视为token过期) 单位: 秒
  active-timeout: -1
  # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token)
  is-share: true
  # token风格
  token-style: uuid
  # 操作日志
  is-log: true
  token-prefix: Bearer
  token-session-check-login: false


######## spring配置
spring:
  env: local
  servlet:
    # 文件上传大小配置
    multipart:
      maxFileSize: 30MB
      maxRequestSize: 10MB
  thymeleaf:
    cache: false
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: mikuyun
    url: jdbc:mysql://127.0.0.1:3306/mikuyun?characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&allowMultiQueries=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=Asia/Shanghai
  data:
    redis:
      # Redis数据库索引（默认为0）
      database: 2
      # Redis服务器地址
      host: 127.0.0.1
      # Redis服务器连接端口
      port: 6379
      # Redis服务器连接密码（默认为空）
      password:
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 200
          # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
          # 连接池中的最大空闲连接
          max-idle: 10
          # 连接池中的最小空闲连接
          min-idle: 0
  # 邮箱服务
  mail:
    host: smtp.163.com
    # 发件人昵称
    nickname: mikuyun
    # 邮箱账户
    username: mikuyun_sendonly@163.com
    # 邮箱第三方授权码
    password: KNYDAMGUCKCPKHUM
    # 编码类型
    default-encoding: UTF-8
    port: 465
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: rue
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
  elasticsearch:
    # docker安装请查看: 01_docs/02_docker-compose文件/elasticsearch
    uris: http://localhost:9200
    username: elastic
    password: 密码


# springdoc 配置
springdoc:
  swagger-ui:
    disable-swagger-default-url: false
  api-docs:
    path: /v3/api-docs
    enabled: true


######## 日志配置
logging:
  config: classpath:logback.xml
  level:
    com.xxl.job.core.server.EmbedServer: off


######## mybatis-plus配置控制台打印完整带参数SQL语句
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


######## xxl-job admin address list, such as "http://address" or "http://address01,http://address02"
xxl:
  job:
    enabled: false
    executor:
      # xxl-job executor registry-address: default use address to registry , otherwise use ip:port if address is null
      address:
      # xxl-job executor server-info
      ip:
      # 执行器 AppName [选填]：执行器心跳注册分组依据；为空则关闭自动注册
      appname: mikuyun-admin-dev-executor
      port: 8092
      # xxl-job executor log-path
      logpath: /data/applogs/xxl-job/job
      # xxl-job executor log-retention-days
      logretentiondays: 30
    admin:
      # 调度中心部署跟地址 [选填]：如调度中心集群部署存在多个地址则用逗号分隔。执行器将会使用该地址进行"执行器心跳注册"和"任务结果回调"；为空则关闭自动注册；
      addresses: https://调度中心地址/xxl-job-admin
      accessToken: 没有就不填
      timeout: 3


######## rocketMQ配置
rocketmq:
  enabled: true
  nameServer: 127.0.0.1:9876
  groupName: mikuyun-admin
  consumeThread: 8


######## 对象存储配置
minio:
  endpoint: minio地址
  access-key: minio-access-key
  secret-key: minio-secret-key
  bucket-name: bucket-name
qiniu:
  # 区域：z0 华东  z1 华北  z2 华南  na0 北美  as0 东南亚
  region: 区域
  excelBucket: excel
  excelFileUrl: excel文件链接
  imageBucket: image
  imageFileUrl: 图片文件链接
  commonFileBucket: file
  commonFileUrl: 其他文件链接
  accessKey: accessKey
  secretKey: secretKey


######## 系统配置
mikuyun:
  salt:
    admin: mikuyun
  # excel任务并行数
  excelTask:
    normalRate: 5
    slowRate: 1



