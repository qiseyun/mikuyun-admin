<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>邮箱验证码</title>
</head>
<body>
<!-- 头部 -->
<div style="padding: 10px; background-color: #393D49;">
    <h2 style="color: #FFFFFF; margin: 0; text-align: center">qiseyun</h2>
</div>
<!-- 内容 -->
<div style="padding-top: 10px; padding-bottom: 10px;">
    <div style="background-color: snow; padding: 20px;">
        <div>
            <h3>尊敬的用户：您好！</h3>
            <p>说明：您现在正在进行敏感操作，为了确保您的账户安全，我们将通过邮件对您进行身份验证。</p>
            <!--/*@thymesVar id="message" type="java.lang.String"*/-->
            <div>
                <h4>本次的验证码为：</h4>
                <div style="background-color: white; padding: 10px;">
                    <!--/*@thymesVar id="captcha" type="int"*/-->
                    <h3 style="color: red" th:text="${captcha}"></h3>
                </div>
                <h4>有效期为10分钟</h4>
                <h4>有效时间段：</h4>
                <!--/*@thymesVar id="expirationDateStart,expirationDateEnd" type="java.time.LocalDateTime"*/-->
                <h3 style="color: orange" th:text="${expirationDateStart} + ' - ' + ${expirationDateEnd}"></h3>
            </div>
        </div>
    </div>
</div>
<!-- 页底 -->
<div style="padding: 10px; text-align: center; background-color: #2F4056;">
    <p style="margin: 0; color: #FFFFFF;">
        Copyright © 2023
        <a href="https://gitee.com/qiseyun/" style="color: #ffcbff;">qiseyun</a>
        All Rights Reserved.
    </p>
</div>
</body>
</html>
